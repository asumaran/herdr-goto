name: Attach binary to Release

# Releases are created from a tag (e.g. via scripts/release.sh, which tags and
# publishes the GitHub release). When a release is published, this workflow
# compiles the binary, stamps the version from the tag, and uploads it as a
# release asset so it can be installed with scripts/update-local.sh without a
# local build step.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Quality gate: if vet/test fail, the job fails and no binary is attached,
      # so a broken release is never installable. Second layer behind
      # scripts/release.sh (which gates locally before tagging).
      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build (darwin/arm64)
        env:
          GOOS: darwin
          GOARCH: arm64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o goto-darwin-arm64 .

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ./goto-darwin-arm64 --clobber
